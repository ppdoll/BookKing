<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>오프라인 — BookKing</title>
<link rel="icon" href="/favicon.png" type="image/png">
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#FFF6E9;color:#3B2F28;
    font-family:'Pretendard',-apple-system,'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    background-image:radial-gradient(#F0E4D2 1.5px,transparent 1.5px);background-size:26px 26px}
  .box{text-align:center;padding:28px 32px;background:#fff;border:2px solid #3B2F28;
    border-radius:18px;box-shadow:3px 3px 0 #3B2F28;max-width:340px;margin:16px}
  h1{font-size:20px;font-weight:900;margin:10px 0 6px}
  p{font-size:14px;color:#97826F;margin:0 0 16px;line-height:1.6}
  button{border:2px solid #3B2F28;background:#FF8A5C;color:#3B2F28;font-weight:800;
    border-radius:12px;padding:9px 20px;font-size:14px;cursor:pointer;box-shadow:2px 2px 0 #3B2F28}
</style>
</head>
<body>
  <div class="box">
    <div style="font-size:44px">📚</div>
    <h1>인터넷 연결이 필요해요</h1>
    <p>BookKing은 그룹원들과 실시간으로 기록을 나누는 서비스예요.<br>네트워크에 연결되면 다시 시도해주세요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
